services:
  collector:
    build:
      context: .
      dockerfile: jobs/collector/Dockerfile
    container_name: ilha-collector
    working_dir: /workspace/jobs/collector
    command: ["sleep", "infinity"]
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV}
      LOG_LEVEL: ${LOG_LEVEL}
      METRICS_ADDR: ${METRICS_ADDR}
      DATABASE_URL: ${DATABASE_URL}
      HUBAPI_BASE_URL: ${HUBAPI_BASE_URL}
    volumes:
      - .:/workspace
    depends_on:
      mock-api:
        condition: service_started
      postgres:
        condition: service_healthy

  player-stats:
    build:
      context: .
      dockerfile: jobs/player-stats/Dockerfile
    container_name: ilha-player-stats
    working_dir: /workspace/jobs/player-stats
    command: ["sleep", "infinity"]
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV}
      LOG_LEVEL: ${LOG_LEVEL}
      DATABASE_URL: ${DATABASE_URL}
      PLAYER_STATS_METRICS_ADDR: ${PLAYER_STATS_METRICS_ADDR:-:9091}
      PLAYER_STATS_BATCH_SIZE: ${PLAYER_STATS_BATCH_SIZE:-100}
      PLAYER_STATS_JOB_NAME: ${PLAYER_STATS_JOB_NAME:-player-stats}
    volumes:
      - .:/workspace
    depends_on:
      postgres:
        condition: service_healthy

  player-stats-api:
    build:
      context: .
      dockerfile: services/player-stats-api/Dockerfile
    container_name: ilha-player-stats-api
    working_dir: /workspace/services/player-stats-api
    command: ["go", "run", "./cmd/player-stats-api"]
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV}
      LOG_LEVEL: ${LOG_LEVEL}
      DATABASE_URL: ${DATABASE_URL}
      PLAYER_STATS_API_HTTP_ADDR: ${PLAYER_STATS_API_HTTP_ADDR:-:8080}
      PLAYER_STATS_API_METRICS_ADDR: ${PLAYER_STATS_API_METRICS_ADDR:-:9092}
      PLAYER_STATS_API_DEFAULT_LIMIT: ${PLAYER_STATS_API_DEFAULT_LIMIT:-50}
      PLAYER_STATS_API_MAX_LIMIT: ${PLAYER_STATS_API_MAX_LIMIT:-100}
      PLAYER_STATS_API_MINIMUM_MATCHES: ${PLAYER_STATS_API_MINIMUM_MATCHES:-10}
      PLAYER_STATS_API_READ_TIMEOUT: ${PLAYER_STATS_API_READ_TIMEOUT:-5s}
      PLAYER_STATS_API_WRITE_TIMEOUT: ${PLAYER_STATS_API_WRITE_TIMEOUT:-10s}
      PLAYER_STATS_API_IDLE_TIMEOUT: ${PLAYER_STATS_API_IDLE_TIMEOUT:-60s}
      PLAYER_STATS_API_SHUTDOWN_TIMEOUT: ${PLAYER_STATS_API_SHUTDOWN_TIMEOUT:-5s}
    ports:
      - "8080:8080"
      - "9092:9092"
    volumes:
      - .:/workspace
    depends_on:
      postgres:
        condition: service_healthy

  mock-api:
    image: nginx:1.27-alpine
    container_name: ilha-mock-api
    ports:
      - "18080:80"
    volumes:
      - ./docs/responses:/usr/share/nginx/html:ro
      - ./docs/mock-api/default.conf:/etc/nginx/conf.d/default.conf:ro

  postgres:
    image: postgres:17-alpine
    container_name: ilha-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
